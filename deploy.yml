---
# Main playbook to deploy Prestashop with MySQL
# Author: DevOps Engineer
# Date: 2025-12-11

- name: Deploy MySQL database
  hosts: mysql_server
  become: yes
  gather_facts: yes
  
  roles:
    - role: mysql
  
  tags:
    - mysql
    - database

- name: Deploy Prestashop web server
  hosts: web_server
  become: yes
  gather_facts: yes
  
  roles:
    - role: prestashop
  
  tags:
    - prestashop
    - web

- name: Final deployment verification
  hosts: all
  become: yes
  gather_facts: no
  
  tasks:
    - name: Verify MySQL is running
      systemd:
        name: mysql
        state: started
      register: mysql_status
      when: "'mysql_server' in group_names"
      
    - name: Verify Apache is running
      systemd:
        name: apache2
        state: started
      register: apache_status
      when: "'web_server' in group_names"
      
    - name: Display MySQL status
      debug:
        msg: "MySQL is operational"
      when: "'mysql_server' in group_names and mysql_status is defined"
      
    - name: Display Apache status
      debug:
        msg: "Apache is operational"
      when: "'web_server' in group_names and apache_status is defined"
      
    - name: Success message
      debug:
        msg:
          - "========================================="
          - "DEPLOYMENT COMPLETED SUCCESSFULLY!"
          - "========================================="
          - "Access Prestashop at: http://localhost"
          - "Database: prestashop_db"
          - "DB User: prestashop_user"
          - "========================================="
      run_once: yes
  
  tags:
    - verification
