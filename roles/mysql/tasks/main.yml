---
# MySQL role - Installation and configuration of MySQL for PrestaShop

- name: Update APT cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install MySQL Server
  apt:
    name:
      - mysql-server
      - mysql-client
      - python3-pymysql
    state: present
  become: true

- name: Ensure MySQL is started and enabled
  systemd:
    name: mysql
    state: started
    enabled: true
  become: true

- name: Configure MySQL root password
  mysql_user:
    name: root
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  become: true
  ignore_errors: true

- name: Create .my.cnf file for root authentication
  template:
    src: my.cnf.j2
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: '0600'
  become: true

- name: Remove anonymous users
  mysql_user:
    name: ''
    host_all: true
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: true

- name: Remove test database
  mysql_db:
    name: test
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: true

- name: Create PrestaShop database
  mysql_db:
    name: "{{ mysql_database }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    encoding: utf8mb4
    collation: utf8mb4_general_ci
  become: true

- name: Create MySQL user for PrestaShop
  mysql_user:
    name: "{{ mysql_user }}"
    password: "{{ mysql_password }}"
    priv: "{{ mysql_database }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: true

- name: Configure MySQL to listen on all interfaces
  lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
    state: present
  become: true
  notify: Restart MySQL

- name: Display connection information
  debug:
    msg:
      - "Database created: {{ mysql_database }}"
      - "User: {{ mysql_user }}"
      - "Host: {{ mysql_host }}"
      - "Port: {{ mysql_port }}"
