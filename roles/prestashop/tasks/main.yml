---
# Rôle prestashop - Installation Apache + PHP + PrestaShop connecté à un MySQL distant.

- name: Install system dependencies
  apt:
    name: "{{ web_packages_common }}"
    state: present
    update_cache: true

- name: Add PHP PPA repository
  apt_repository:
    repo: "{{ php_ppa }}"
    state: present
    update_cache: true

- name: Install PHP and required extensions
  apt:
    name: "{{ php_packages }}"
    state: present

- name: Enable required Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop: "{{ apache_modules }}"
  notify: Restart Apache

- name: Create PrestaShop installation directory
  file:
    path: "{{ prestashop_install_dir }}"
    state: directory
    owner: "{{ prestashop_user }}"
    group: "{{ prestashop_group }}"
    mode: '0755'

- name: Download PrestaShop {{ prestashop_version }}
  get_url:
    url: "https://github.com/PrestaShop/PrestaShop/releases/download/{{ prestashop_version }}/prestashop_{{ prestashop_version }}.zip"
    dest: "/tmp/prestashop_{{ prestashop_version }}.zip"
    mode: '0644'

- name: Extract PrestaShop outer archive
  unarchive:
    src: "/tmp/prestashop_{{ prestashop_version }}.zip"
    dest: "{{ prestashop_install_dir }}"
    remote_src: true
    owner: "{{ prestashop_user }}"
    group: "{{ prestashop_group }}"
    creates: "{{ prestashop_install_dir }}/prestashop.zip"

- name: Check for inner prestashop.zip archive
  stat:
    path: "{{ prestashop_install_dir }}/prestashop.zip"
  register: prestashop_inner_zip

- name: Extract inner prestashop.zip archive
  unarchive:
    src: "{{ prestashop_install_dir }}/prestashop.zip"
    dest: "{{ prestashop_install_dir }}"
    remote_src: true
    owner: "{{ prestashop_user }}"
    group: "{{ prestashop_group }}"
    creates: "{{ prestashop_install_dir }}/index.php"
  when: prestashop_inner_zip.stat.exists

- name: Set ownership and permissions on PrestaShop files
  file:
    path: "{{ prestashop_install_dir }}"
    owner: "{{ prestashop_user }}"
    group: "{{ prestashop_group }}"
    recurse: true
    mode: 'u=rwX,g=rX,o=rX'

- name: Configure Apache VirtualHost for PrestaShop
  template:
    src: prestashop.conf.j2
    dest: /etc/apache2/sites-available/prestashop.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Apache

- name: Enable PrestaShop site
  command: a2ensite prestashop.conf
  args:
    creates: /etc/apache2/sites-enabled/prestashop.conf
  notify: Restart Apache

- name: Disable default Apache site
  command: a2dissite 000-default.conf
  args:
    removes: /etc/apache2/sites-enabled/000-default.conf
  notify: Restart Apache

- name: Configure PHP for PrestaShop
  template:
    src: php.ini.j2
    dest: "/etc/php/{{ php_version }}/apache2/conf.d/99-prestashop.ini"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Apache

- name: Ensure Apache is started and enabled
  systemd:
    name: "{{ apache_service_name }}"
    state: started
    enabled: true

# Le mot de passe passe par la variable d'environnement MYSQL_PWD :
# il n'apparaît ni dans la liste des processus ni dans les logs (no_log).
- name: Test connection to the remote MySQL database
  command: >
    mysql -h {{ prestashop_db_host }} -P {{ prestashop_db_port }}
    -u {{ prestashop_db_user }} {{ prestashop_db_name }} -e "SELECT 1;"
  environment:
    MYSQL_PWD: "{{ prestashop_db_password }}"
  register: mysql_connection_test
  changed_when: false
  no_log: true

- name: Display deployment information
  debug:
    msg:
      - "PrestaShop installed in: {{ prestashop_install_dir }}"
      - "URL: http://{{ prestashop_domain }}"
      - "Database: {{ prestashop_db_name }} on {{ prestashop_db_host }}:{{ prestashop_db_port }} (connection OK)"
      - "DB User: {{ prestashop_db_user }}"
      - "Continue installation via the web interface"
