---
# Inventaire Staging - Déploiement Prestashop + MySQL
# Architecture: 2 VMs distinctes sur infrastructure staging (test)

all:
  children:
    mysql_servers:
      hosts:
        mysql_staging:
          ansible_host: 192.168.56.21
          ansible_user: vagrant
          ansible_connection: local
          
    web_servers:
      hosts:
        web_staging:
          ansible_host: 192.168.56.22
          ansible_user: vagrant
          # Connexion par clé SSH — exécuter `ssh-copy-id vagrant@192.168.56.22`
          # depuis le contrôleur avant le premier déploiement.
          
    ungrouped: {}

  vars:
    # Variables globales pour staging
    ansible_python_interpreter: /usr/bin/python3
    environment_name: staging
    ansible_ssh_common_args: -o StrictHostKeyChecking=no
