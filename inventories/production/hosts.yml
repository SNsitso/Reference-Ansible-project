---
# Inventaire Production - Déploiement Prestashop + MySQL
# Architecture: 2 VMs distinctes sur infrastructure production

all:
  children:
    mysql_servers:
      hosts:
        mysql_prod:
          ansible_host: 192.168.56.11
          ansible_user: vagrant
          ansible_connection: local
          
    web_servers:
      hosts:
        web_prod:
          ansible_host: 192.168.56.12
          ansible_user: vagrant
          # Connexion par clé SSH — exécuter `ssh-copy-id vagrant@192.168.56.12`
          # depuis le contrôleur avant le premier déploiement.
          
    # Meta-groupe pour all
    ungrouped: {}

  vars:
    # Variables globales pour tous les environnements
    ansible_python_interpreter: /usr/bin/python3
    environment_name: production
    ansible_ssh_common_args: -o StrictHostKeyChecking=no
