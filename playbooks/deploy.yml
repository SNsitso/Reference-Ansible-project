---
# Main playbook to deploy Prestashop with MySQL
# Author: DevOps Engineer
# Date: 2025-12-11
#
# Usage:
#   Production: ansible-playbook playbooks/deploy.yml -i inventories/production/
#   Staging:    ansible-playbook playbooks/deploy.yml -i inventories/staging/
#
# Simulation:  ansible-playbook playbooks/deploy.yml -i inventories/production/ --check
# Verbose:     ansible-playbook playbooks/deploy.yml -i inventories/production/ -vvv

- name: Deploy MySQL database
  hosts: mysql_servers
  become: true
  gather_facts: true
  
  pre_tasks:
    - name: Display environment information
      debug:
        msg:
          - "Environment: {{ environment_name | default('unknown') }}"
          - "Host: {{ inventory_hostname }}"
          - "IP Address: {{ ansible_host }}"
      
    - name: Validate required MySQL variables
      assert:
        that:
          - mysql_root_password is defined
          - mysql_database is defined
          - mysql_app_user is defined
          - mysql_app_password is defined
        fail_msg: "Required MySQL variables are missing"
        
  roles:
    - role: mysql
      tags:
        - mysql
        - database
  
  post_tasks:
    - name: Verify MySQL is running
      systemd:
        name: "{{ mysql_service_name }}"
        state: started
        enabled: true
      register: mysql_status
      
    - name: Display MySQL status
      debug:
        msg: "MySQL is operational on {{ inventory_hostname }}"
      when: mysql_status.status.ActiveState == 'active'

- name: Deploy Prestashop web server
  hosts: web_servers
  become: true
  gather_facts: true
  
  pre_tasks:
    - name: Display environment information
      debug:
        msg:
          - "Environment: {{ environment_name | default('unknown') }}"
          - "Host: {{ inventory_hostname }}"
          - "IP Address: {{ ansible_host }}"
      
    - name: Validate required Prestashop variables
      assert:
        that:
          - prestashop_version is defined
          - prestashop_install_dir is defined
          - prestashop_db_host is defined
          - prestashop_db_name is defined
          - php_version is defined
        fail_msg: "Required Prestashop variables are missing"
        
    - name: Wait for MySQL to be accessible
      wait_for:
        host: "{{ groups['mysql_servers'][0] }}"
        port: 3306
        timeout: 300
      tags:
        - skip_ansible_lint
        
  roles:
    - role: prestashop
      tags:
        - prestashop
        - web
  
  post_tasks:
    - name: Verify Apache is running
      systemd:
        name: "{{ apache_service_name }}"
        state: started
        enabled: true
      register: apache_status
      
    - name: Display Apache status
      debug:
        msg: "Apache is operational on {{ inventory_hostname }}"
      when: apache_status.status.ActiveState == 'active'

- name: Final deployment verification
  hosts: all
  become: true
  gather_facts: false
  
  tasks:
    - name: Verify MySQL is running
      systemd:
        name: "{{ mysql_service_name }}"
        state: started
      register: mysql_status
      when: "'mysql_servers' in group_names"
      failed_when: false
      
    - name: Verify Apache is running
      systemd:
        name: "{{ apache_service_name }}"
        state: started
      register: apache_status
      when: "'web_servers' in group_names"
      failed_when: false
      
    - name: Display MySQL status
      debug:
        msg: "MySQL is operational and running"
      when: "'mysql_servers' in group_names and mysql_status.status.ActiveState == 'active'"
      
    - name: Display Apache status
      debug:
        msg: "Apache is operational and running"
      when: "'web_servers' in group_names and apache_status.status.ActiveState == 'active'"
      
    - name: Final success message
      debug:
        msg:
          - "========================================="
          - "DEPLOYMENT COMPLETED SUCCESSFULLY!"
          - "========================================="
          - "Environment: {{ environment_name | default('unknown') }}"
          - "Access Prestashop at: http://{{ groups['web_servers'][0] }}"
          - "Database: prestashop_db"
          - "DB User: prestashop_user"
          - "========================================="
      run_once: true
      tags:
        - always
  
  tags:
    - verification
