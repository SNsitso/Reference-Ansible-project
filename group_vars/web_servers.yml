---
# Variables communes à TOUS les serveurs web (tous environnements).
# Ne contient que ce qui diffère des defaults du rôle ou qui doit être
# garanti au niveau du groupe. Le reste vit dans roles/prestashop/defaults/.

apache_vhost_port: 80

# Modules Apache requis sur tout le parc web
apache_modules:
  - rewrite
  - headers
  - ssl
