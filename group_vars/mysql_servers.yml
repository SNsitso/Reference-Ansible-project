---
# Variables communes à TOUS les serveurs MySQL (tous environnements).
# Ne contient que ce qui diffère des defaults du rôle ou qui doit être
# garanti au niveau du groupe. Le reste vit dans roles/mysql/defaults/.

mysql_port: 3306
mysql_bind_address: '0.0.0.0'  # écoute réseau : requis car le serveur web est distant

# Durcissement systématique sur tout serveur MySQL du parc
mysql_remove_anonymous_users: true
mysql_remove_test_database: true
