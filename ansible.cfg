[defaults]
# Inventaire par défaut - Production (surcharger avec -i inventories/staging)
inventory = inventories/production/hosts.yml

# Default roles path
roles_path = ./roles

# Fichier du mot de passe vault (décommenter si .vault_pass existe, mode 600)
# vault_password_file = .vault_pass

# Default SSH configuration
host_key_checking = False
retry_files_enabled = False

# Python interpreter
interpreter_python = auto_silent

# Logging (uncomment to enable)
# log_path = ./logs/ansible.log

[ssh_connection]
# SSH optimizations
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
control_path = %(directory)s/%%h-%%p-%%r
pipelining = True

[privilege_escalation]
# Sudo configuration
become_method = sudo
become_user = root

[inventory]
# Inventory plugins
enable_plugins = yaml, ini, csv, aws_ec2
