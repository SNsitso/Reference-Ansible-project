---
# Variables spécifiques au serveur Web Staging (PrestaShop)
# Host: web_staging (192.168.56.22)

# Identité de l'hôte
hostname: prestashop-web-staging
environment_type: staging

# Configuration PrestaShop
prestashop_version: '8.1.2'
prestashop_install_dir: /var/www/prestashop_staging
prestashop_domain: 192.168.56.22

# Administrateur PrestaShop (secret depuis le vault staging)
prestashop_admin_email: admin@prestashop-staging.local
prestashop_admin_password: "{{ vault_prestashop_admin_password }}"

# Base de données distante (IP résolue depuis l'inventaire staging)
prestashop_db_host: "{{ hostvars['mysql_staging'].ansible_host }}"
prestashop_db_name: prestashop_db_staging
prestashop_db_user: prestashop_user_staging
prestashop_db_password: "{{ vault_mysql_app_password }}"

# PHP (ressources réduites en staging)
php_version: '7.4'
php_memory_limit: 128M
php_max_execution_time: 60
php_upload_max_filesize: 50M
php_post_max_size: 50M

# Logs Apache spécifiques
apache_prestashop_error_log: /var/log/apache2/prestashop_staging_error.log
apache_prestashop_access_log: /var/log/apache2/prestashop_staging_access.log
