---
# Variables spécifiques au serveur MySQL Staging
# Host: mysql_staging (192.168.56.21)

# Identité de l'hôte
hostname: mysql-server-staging
environment_type: staging

# Mot de passe root MySQL (à gérer avec Vault)
mysql_root_password: "{{ vault_mysql_root_password_staging }}"

# Configuration de la base de données Prestashop
mysql_database: 'prestashop_db_staging'
mysql_db_charset: 'utf8mb4'
mysql_db_collation: 'utf8mb4_unicode_ci'

# Utilisateur application MySQL
mysql_app_user: 'prestashop_user_staging'
mysql_app_password: "{{ vault_prestashop_db_password_staging }}"
mysql_app_user_host: '%'
mysql_app_privileges: 'ALL'

# Optimisations Staging (ressources réduites)
mysql_max_connections: 50
mysql_innodb_buffer_pool_size: '512M'
mysql_slow_query_log: no

# Backup Staging
mysql_backup_enabled: no
