---
# Variables spécifiques au serveur MySQL Staging
# Host: mysql_staging (192.168.56.21)

# Identité de l'hôte
hostname: mysql-server-staging
environment_type: staging

# Secrets : mêmes noms de variables qu'en production, mais les VALEURS
# viennent du vault staging (inventories/staging/group_vars/all/vault.yml)
mysql_root_password: "{{ vault_mysql_root_password }}"
mysql_app_password: "{{ vault_mysql_app_password }}"

# Base de données applicative
mysql_database: prestashop_db_staging
mysql_app_user: prestashop_user_staging
mysql_app_user_host: '%'

# Optimisations Staging (ressources réduites)
mysql_max_connections: 50
mysql_innodb_buffer_pool_size: 512M
mysql_slow_query_log: false

# Backup Staging
mysql_backup_enabled: false
